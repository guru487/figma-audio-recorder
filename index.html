<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Audio Recorder — Audio Comments</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F7F8;--surface:#fff;--border:#E4E4E8;
  --accent:#5B57FF;--accent-hover:#4845E0;--accent-light:#EEEEFF;
  --red:#EF4444;--red-light:#FEF2F2;
  --green:#22C55E;--green-light:#F0FDF4;
  --text:#0F0F10;--text-sec:#6B6B78;--text-muted:#A0A0AB;
  --radius:12px;--radius-sm:8px;
}
html,body{
  width:360px;height:100vh;
  background:var(--bg);
  font-family:'DM Sans',sans-serif;
  color:var(--text);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.card{
  width:320px;
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--border);
  padding:24px;
  box-shadow:0 8px 32px rgba(0,0,0,0.08);
  display:flex;flex-direction:column;gap:16px;
}
.card-header{display:flex;align-items:center;gap:10px;}
.logo{
  width:36px;height:36px;background:var(--accent);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-title{font-size:15px;font-weight:600;}
.card-subtitle{font-size:12px;color:var(--text-muted);}

/* STATES */
.state{display:none;flex-direction:column;gap:12px;}
.state.active{display:flex;}

/* IDLE */
.record-center{display:flex;flex-direction:column;align-items:center;gap:10px;}
.record-btn{
  width:64px;height:64px;border-radius:50%;
  background:var(--red);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:white;
  box-shadow:0 4px 20px rgba(239,68,68,0.4);
  transition:all .2s;
}
.record-btn:hover{transform:scale(1.07);box-shadow:0 6px 24px rgba(239,68,68,0.5);}
.record-hint{font-size:12px;color:var(--text-muted);text-align:center;}

/* RECORDING */
.recording-center{display:flex;flex-direction:column;align-items:center;gap:10px;}
.rec-indicator{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--red);}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.timer{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;letter-spacing:2px;}
.waveform{width:100%;height:44px;border-radius:8px;background:var(--bg);}
.stop-btn{
  width:100%;padding:11px;
  background:var(--text);color:white;border:none;
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:opacity .15s;
}
.stop-btn:hover{opacity:.85;}

/* PREVIEW */
.player-wrap{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--bg);
  border-radius:var(--radius-sm);border:1px solid var(--border);
}
.play-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:white;flex-shrink:0;transition:background .15s;
}
.play-btn:hover{background:var(--accent-hover);}
.track{flex:1;}
.progress-wrap{height:4px;background:var(--border);border-radius:4px;cursor:pointer;margin-bottom:4px;position:relative;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;width:0%;transition:width .1s linear;position:relative;}
.progress-fill::after{content:'';position:absolute;right:-5px;top:-3px;width:10px;height:10px;background:var(--accent);border-radius:50%;box-shadow:0 0 0 2px white;}
.time-row{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);display:flex;justify-content:space-between;}

.label-input{
  width:100%;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;
  color:var(--text);background:var(--bg);
  outline:none;resize:none;height:56px;
  transition:border-color .15s;
}
.label-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,87,255,.08);background:var(--surface);}
.label-input::placeholder{color:var(--text-muted);}

.action-row{display:flex;gap:8px;}
.btn-discard{
  flex:1;padding:10px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);background:var(--surface);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  color:var(--text-sec);cursor:pointer;transition:all .15s;
}
.btn-discard:hover{background:var(--bg);}
.btn-send{
  flex:2;padding:10px;border:none;
  border-radius:var(--radius-sm);background:var(--accent);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  color:white;cursor:pointer;transition:background .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 2px 8px rgba(91,87,255,.25);
}
.btn-send:hover{background:var(--accent-hover);}
.btn-send:disabled{background:var(--text-muted);box-shadow:none;cursor:not-allowed;}

/* UPLOADING */
.uploading-center{display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 0;}
.upload-spinner{
  width:40px;height:40px;
  border:3px solid var(--accent-light);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-label{font-size:13px;font-weight:500;color:var(--text-sec);}
.upload-bar-wrap{width:100%;height:4px;background:var(--border);border-radius:4px;}
.upload-bar-fill{height:100%;background:var(--accent);border-radius:4px;width:0%;transition:width .3s ease;}

/* SUCCESS */
.success-center{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0;}
.success-icon{
  width:48px;height:48px;background:var(--green-light);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.success-title{font-size:14px;font-weight:600;color:var(--text);}
.success-sub{font-size:12px;color:var(--text-muted);text-align:center;}

/* ERROR */
.error-center{display:flex;flex-direction:column;align-items:center;gap:10px;padding:4px 0;}
.error-icon{
  width:40px;height:40px;background:var(--red-light);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.error-msg{font-size:12.5px;color:var(--red);text-align:center;line-height:1.5;}
.btn-retry-err{
  padding:8px 24px;background:var(--red);color:white;border:none;
  border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
}

.spinner-sm{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
      </svg>
    </div>
    <div>
      <div class="card-title">Record Audio Comment</div>
      <div class="card-subtitle" id="node-label">Ready to record</div>
    </div>
  </div>

  <!-- IDLE -->
  <div class="state active" id="state-idle">
    <div class="record-center">
      <button class="record-btn" id="record-btn">
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" fill="none" stroke="white" stroke-width="2"/>
        </svg>
      </button>
      <div class="record-hint">Click to start recording your voice comment</div>
    </div>
  </div>

  <!-- RECORDING -->
  <div class="state" id="state-recording">
    <div class="recording-center">
      <div class="rec-indicator"><div class="rec-dot"></div> Recording...</div>
      <div class="timer" id="timer">0:00</div>
      <canvas class="waveform" id="waveform" width="272" height="44"></canvas>
      <button class="stop-btn" id="stop-btn">Stop Recording</button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="state" id="state-preview">
    <div class="player-wrap">
      <button class="play-btn" id="play-btn">
        <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <div class="track">
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="cur-time">0:00</span>
          <span id="dur-time">0:00</span>
        </div>
      </div>
    </div>
    <textarea class="label-input" id="label-input" placeholder="Add a note or label (optional)..."></textarea>
    <div class="action-row">
      <button class="btn-discard" id="discard-btn">Discard</button>
      <button class="btn-send" id="send-btn">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
        Save to Figma
      </button>
    </div>
  </div>

  <!-- UPLOADING -->
  <div class="state" id="state-uploading">
    <div class="uploading-center">
      <div class="upload-spinner"></div>
      <div class="upload-label">Uploading to cloud...</div>
      <div class="upload-bar-wrap"><div class="upload-bar-fill" id="upload-bar"></div></div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="state" id="state-success">
    <div class="success-center">
      <div class="success-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#22C55E" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
      </div>
      <div class="success-title">Comment Saved! ✅</div>
      <div class="success-sub">Your audio comment has been added to the Figma layer. This window will close in a moment.</div>
    </div>
  </div>

  <!-- ERROR -->
  <div class="state" id="state-error">
    <div class="error-center">
      <div class="error-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#EF4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="error-msg" id="error-msg">Something went wrong. Please try again.</div>
      <button class="btn-retry-err" id="retry-err-btn">Try Again</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const AWS_REGION     = 'ap-south-1';
const S3_BUCKET      = 'figma-audio-comments';
const AWS_ACCESS_KEY = 'AKIA2UHZHYNC55AZNRWN';
const AWS_SECRET_KEY = '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';

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let mediaRecorder   = null;
let audioChunks     = [];
let recordedBlob    = null;
let previewAudio    = null;
let timerInterval   = null;
let timerSeconds    = 0;
let animFrame       = null;
let audioCtx        = null;
let analyser        = null;

// Read params from URL
const params   = new URLSearchParams(window.location.search);
const nodeId   = params.get('nodeId')   || '';
const nodeName = params.get('nodeName') || 'Layer';
const origin   = params.get('origin')   || '*';

document.getElementById('node-label').textContent = 'Layer: ' + decodeURIComponent(nodeName);

// ══════════════════════════════════════════
// SHOW STATE
// ══════════════════════════════════════════
function showState(s) {
  ['idle','recording','preview','uploading','success','error'].forEach(n => {
    document.getElementById('state-' + n).className = 'state' + (n === s ? ' active' : '');
  });
}

// ══════════════════════════════════════════
// RECORDING
// ══════════════════════════════════════════
document.getElementById('record-btn').addEventListener('click', startRecording);
document.getElementById('stop-btn').addEventListener('click', stopRecording);

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 44100 }
    });
    audioChunks = [];
    audioCtx    = new AudioContext();
    analyser    = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = onStop;
    mediaRecorder.start(100);

    showState('recording');
    startTimer();
    drawWaveform();
  } catch (err) {
    showError('Microphone access denied. Please allow microphone in your browser and reload.');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  stopTimer();
  stopWaveform();
}

function onStop() {
  recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
  previewAudio = new Audio(URL.createObjectURL(recordedBlob));
  previewAudio.ontimeupdate    = updateProgress;
  previewAudio.onended         = onEnded;
  previewAudio.onloadedmetadata = () => {
    document.getElementById('dur-time').textContent = fmt(previewAudio.duration);
  };
  showState('preview');
}

// ══════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════
function startTimer() {
  timerSeconds = 0; updTimer();
  timerInterval = setInterval(() => { timerSeconds++; updTimer(); }, 1000);
}
function stopTimer()  { clearInterval(timerInterval); }
function updTimer()   { document.getElementById('timer').textContent = fmt(timerSeconds); }
function fmt(s) {
  const m = Math.floor(s / 60);
  return m + ':' + Math.floor(s % 60).toString().padStart(2, '0');
}

// ══════════════════════════════════════════
// WAVEFORM
// ══════════════════════════════════════════
function drawWaveform() {
  const canvas = document.getElementById('waveform');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  function draw() {
    animFrame = requestAnimationFrame(draw);
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, W, H);
    const bW = 3, gap = 2, total = bW + gap, bars = Math.floor(W / total);
    for (let i = 0; i < bars; i++) {
      const val = data[Math.floor(i * data.length / bars)] / 255;
      const h   = Math.max(3, val * H);
      ctx.fillStyle = `rgba(91,87,255,${0.3 + val * 0.7})`;
      ctx.beginPath();
      ctx.roundRect(i * total, (H - h) / 2, bW, h, 2);
      ctx.fill();
    }
  }
  draw();
}
function stopWaveform() {
  cancelAnimationFrame(animFrame);
  const c = document.getElementById('waveform');
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

// ══════════════════════════════════════════
// PREVIEW PLAYER
// ══════════════════════════════════════════
document.getElementById('play-btn').addEventListener('click', () => {
  if (!previewAudio) return;
  const btn = document.getElementById('play-btn');
  if (previewAudio.paused) {
    previewAudio.play();
    btn.innerHTML = '<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
  } else {
    previewAudio.pause();
    btn.innerHTML = '<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
  }
});
function updateProgress() {
  if (!previewAudio || !previewAudio.duration) return;
  const p = (previewAudio.currentTime / previewAudio.duration) * 100;
  document.getElementById('progress-fill').style.width = p + '%';
  document.getElementById('cur-time').textContent = fmt(previewAudio.currentTime);
}
function onEnded() {
  document.getElementById('play-btn').innerHTML = '<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('cur-time').textContent = '0:00';
}
document.getElementById('progress-wrap').addEventListener('click', e => {
  if (!previewAudio) return;
  const r = e.currentTarget.getBoundingClientRect();
  previewAudio.currentTime = ((e.clientX - r.left) / r.width) * previewAudio.duration;
});

// ══════════════════════════════════════════
// DISCARD & SEND
// ══════════════════════════════════════════
document.getElementById('discard-btn').addEventListener('click', () => {
  if (previewAudio) { previewAudio.pause(); previewAudio = null; }
  recordedBlob = null; audioChunks = [];
  document.getElementById('label-input').value = '';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('cur-time').textContent = '0:00';
  document.getElementById('dur-time').textContent = '0:00';
  document.getElementById('play-btn').innerHTML = '<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
  showState('idle');
});

document.getElementById('send-btn').addEventListener('click', async () => {
  if (!recordedBlob) return;
  showState('uploading');
  simulateBar();
  try {
    const url   = await uploadToS3(recordedBlob);
    const label = document.getElementById('label-input').value.trim();
    const comment = {
      id:        'ac_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      url,
      label,
      duration:  previewAudio ? Math.round(previewAudio.duration) : 0,
      createdAt: new Date().toISOString()
    };
    // Send to opener (Figma plugin)
    if (window.opener) {
      window.opener.postMessage({ type: 'audio-comment-ready', nodeId, comment }, '*');
    }
    showState('success');
    setTimeout(() => window.close(), 2500);
  } catch (err) {
    showError('Upload failed: ' + err.message);
  }
});

document.getElementById('retry-err-btn').addEventListener('click', () => showState('idle'));

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  showState('error');
}

function simulateBar() {
  let w = 0;
  const bar = document.getElementById('upload-bar');
  const iv  = setInterval(() => {
    w = Math.min(w + Math.random() * 15, 85);
    bar.style.width = w + '%';
    if (w >= 85) clearInterval(iv);
  }, 200);
}

// ══════════════════════════════════════════
// AWS S3 UPLOAD
// ══════════════════════════════════════════
async function uploadToS3(blob) {
  const fileName = 'audio-comments/' + Date.now() + '-' + Math.random().toString(36).substr(2, 8) + '.webm';
  const url      = `https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/${fileName}`;
  const now      = new Date();

  function pad(n) { return n.toString().padStart(2, '0'); }
  const dateStr = now.getUTCFullYear() + pad(now.getUTCMonth()+1) + pad(now.getUTCDate());
  const dtStr   = dateStr + 'T' + pad(now.getUTCHours()) + pad(now.getUTCMinutes()) + pad(now.getUTCSeconds()) + 'Z';

  const contentType  = 'audio/webm';
  const host         = `${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com`;
  const payloadHash  = await sha256Hex(blob);

  const canonHeaders =
    `content-type:${contentType}\n` +
    `host:${host}\n` +
    `x-amz-content-sha256:${payloadHash}\n` +
    `x-amz-date:${dtStr}\n`;
  const signedHeaders = 'content-type;host;x-amz-content-sha256;x-amz-date';
  const canonReq      = ['PUT', '/' + fileName, '', canonHeaders, signedHeaders, payloadHash].join('\n');
  const credScope     = `${dateStr}/${AWS_REGION}/s3/aws4_request`;
  const sts           = ['AWS4-HMAC-SHA256', dtStr, credScope, await sha256Hex(canonReq)].join('\n');
  const sigKey        = await getSigningKey(AWS_SECRET_KEY, dateStr, AWS_REGION, 's3');
  const sig           = await hmacHex(sigKey, sts);
  const auth          = `AWS4-HMAC-SHA256 Credential=${AWS_ACCESS_KEY}/${credScope}, SignedHeaders=${signedHeaders}, Signature=${sig}`;

  const resp = await fetch(url, {
    method: 'PUT',
    headers: {
      'Content-Type':         contentType,
      'x-amz-date':           dtStr,
      'x-amz-content-sha256': payloadHash,
      'Authorization':        auth
    },
    body: blob
  });
  if (!resp.ok) { const t = await resp.text(); throw new Error(`S3 ${resp.status}: ${t}`); }
  return url;
}

async function sha256Hex(data) {
  const buf  = data instanceof Blob ? await data.arrayBuffer() : new TextEncoder().encode(data);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function hmacSha256(key, data) {
  const k = key instanceof CryptoKey ? key : await crypto.subtle.importKey(
    'raw',
    typeof key === 'string' ? new TextEncoder().encode(key) : key,
    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
  );
  return new Uint8Array(await crypto.subtle.sign('HMAC', k, new TextEncoder().encode(data)));
}
async function hmacHex(key, data) {
  return Array.from(await hmacSha256(key, data)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function getSigningKey(secret, date, region, service) {
  const kDate    = await hmacSha256('AWS4' + secret, date);
  const kRegion  = await hmacSha256(kDate, region);
  const kService = await hmacSha256(kRegion, service);
  const kSigning = await hmacSha256(kService, 'aws4_request');
  return crypto.subtle.importKey('raw', kSigning, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
}
